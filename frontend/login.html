<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthosAI | Secure Access</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

    <!-- Floating Particles -->
    <div class="login-particles" id="particles"></div>

    <!-- Login/Register Container -->
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo" onclick="window.location.href='/'">
            <div class="login-logo-icon">
                <i class="fa-solid fa-scale-balanced"></i>
            </div>
            <h1>EthosAI</h1>
        </div>

        <!-- Toggles -->
        <div class="login-tabs">
            <button id="tab-login" class="login-tab active" onclick="switchTab('login')">Sign In</button>
            <button id="tab-register" class="login-tab" onclick="switchTab('register')">Create Profile</button>
        </div>

        <!-- System Message / Errors -->
        <div id="sys-message"></div>

        <!-- Login Form -->
        <form id="form-login" onsubmit="handleAuth(event, 'login')">
            <div class="login-field">
                <label>Email Address</label>
                <input type="email" id="login-email" required class="login-input" placeholder="you@company.com">
            </div>
            <div class="login-field">
                <label>Password</label>
                <input type="password" id="login-password" required class="login-input" placeholder="••••••••">
            </div>
            <button type="submit" class="login-submit">
                Access Platform <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <!-- Register Form -->
        <form id="form-register" class="hidden-form" onsubmit="handleAuth(event, 'register')">
            <div class="login-field">
                <label>Full Name</label>
                <input type="text" id="reg-name" required class="login-input" placeholder="Jane Doe">
            </div>
            <div class="login-field">
                <label>Email Address</label>
                <input type="email" id="reg-email" required class="login-input" placeholder="jane@company.com">
            </div>
            <div class="login-field">
                <label>Secure Password</label>
                <input type="password" id="reg-password" required class="login-input" placeholder="••••••••">
            </div>
            <button type="submit" class="login-submit register-btn">
                Create Account
            </button>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('sys-message').classList.remove('error', 'success');
            
            if(tab === 'login') {
                document.getElementById('form-login').classList.remove('hidden-form');
                document.getElementById('form-register').classList.add('hidden-form');
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('tab-register').classList.remove('active');
            } else {
                document.getElementById('form-register').classList.remove('hidden-form');
                document.getElementById('form-login').classList.add('hidden-form');
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('tab-login').classList.remove('active');
            }
        }

        function showMessage(msg, isError) {
            const el = document.getElementById('sys-message');
            el.innerHTML = msg;
            el.className = isError ? 'error' : 'success';
        }

        async function handleAuth(e, type) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Verifying...';
            btn.disabled = true;

            const endpoint = type === 'login' ? '/api/login' : '/api/signup';
            
            const payload = {};
            if (type === 'login') {
                payload.email = document.getElementById('login-email').value;
                payload.password = document.getElementById('login-password').value;
            } else {
                payload.name = document.getElementById('reg-name').value;
                payload.email = document.getElementById('reg-email').value;
                payload.password = document.getElementById('reg-password').value;
            }

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (data.error) {
                    showMessage(data.error, true);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                } else {
                    showMessage(data.success || 'Welcome back! Redirecting...', false);
                    setTimeout(() => {
                        window.location.href = '/chat';
                    }, 1000);
                }
            } catch (err) {
                showMessage("Nexus terminal connection failed.", true);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Particle Generation
        const particlesContainer = document.getElementById('particles');
        const particleCount = 20;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'chat-particle'; // reuse chat particle animation
            particle.style.left = Math.random() * 100 + '%';
            particle.style.bottom = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.opacity = Math.random() * 0.5;
            particle.style.width = Math.random() * 6 + 2 + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
