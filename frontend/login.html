<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthosAI | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Creative Sticker Wallpaper Aesthetic using Data URIs */
            background-color: #f8fafc;
            background-image: 
                /* Abstract Scale/Balance SVG Sticker */
                url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 20 L20 40 L80 40 Z' fill='none' stroke='%230D9488' stroke-width='3' stroke-linejoin='round' opacity='0.15'/%3E%3Cpath d='M50 20 V80 M30 40 V60 M70 40 V60' stroke='%230D9488' stroke-width='3' stroke-linecap='round' opacity='0.15'/%3E%3Ccircle cx='30' cy='65' r='10' fill='none' stroke='%233b82f6' stroke-width='2' opacity='0.2'/%3E%3Ccircle cx='70' cy='65' r='10' fill='none' stroke='%233b82f6' stroke-width='2' opacity='0.2'/%3E%3C/svg%3E"),
                /* Abstract Nodes/Ethics Network SVG Sticker */
                url("data:image/svg+xml,%3Csvg width='300' height='300' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='4' fill='%230ea5e9' opacity='0.2'/%3E%3Ccircle cx='80' cy='30' r='6' fill='%230ea5e9' opacity='0.2'/%3E%3Ccircle cx='40' cy='80' r='5' fill='%230ea5e9' opacity='0.2'/%3E%3Cpath d='M20 20 L80 30 L40 80 Z' fill='none' stroke='%23bae6fd' stroke-width='1' stroke-dasharray='4 4' opacity='0.3'/%3E%3C/svg%3E"),
                /* Dynamic soft gradient glow */
                radial-gradient(circle at 15% 15%, #ccfdca 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, #bae6fd 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #f0fdfa 0%, transparent 60%);
            background-repeat: repeat, repeat, no-repeat, no-repeat, no-repeat;
            background-position: 10% 20%, 80% 70%, 0 0, 0 0, 0 0;
            background-attachment: fixed;
            overflow: hidden;
            animation: breathe 15s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { background-position: 10% 20%, 80% 70%, 0 0, 0 0, 0 0; }
            100% { background-position: 15% 25%, 75% 65%, 20px 20px, -20px -20px, 0 0; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 50px -12px rgba(13, 148, 136, 0.15);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #0d9488;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
            background: #ffffff;
        }

        .toggle-btn {
            color: #64748b;
            cursor: pointer;
            transition: color 0.2s;
        }
        .toggle-btn:hover { color: #0d9488; }
        .toggle-active { color: #0f172a; font-weight: 600; border-bottom: 2px solid #0d9488; }

        .hidden-form { display: none; }
        
        /* Floating sticker decorations outside the card */
        .decoration {
            position: absolute;
            pointer-events: none;
            z-index: -1;
            opacity: 0.8;
            animation: floatSlow 10s infinite ease-in-out alternate;
        }
        @keyframes floatSlow {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body class="relative">

    <!-- CSS Rendered "Stickers" -->
    <div class="decoration" style="top: 15%; left: 20%;">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 4px 6px rgba(14, 165, 233, 0.2));">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
    </div>
    <div class="decoration" style="bottom: 20%; right: 15%; animation-delay: -5s;">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 4px 6px rgba(13, 148, 136, 0.2));">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
    </div>

    <!-- Login/Register Container -->
    <div class="glass-panel w-full max-w-md p-8 rounded-3xl relative z-10 m-4">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-3 mb-8 cursor-pointer" onclick="window.location.href='/'">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <path d="M9 12l2 2 4-4"/>
            </svg>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">EthosAI</h1>
        </div>

        <!-- Toggles -->
        <div class="flex justify-center gap-8 mb-8 border-b border-slate-200 pb-2">
            <span id="tab-login" class="toggle-btn toggle-active px-2 pb-2 text-lg" onclick="switchTab('login')">Sign In</span>
            <span id="tab-register" class="toggle-btn px-2 pb-2 text-lg" onclick="switchTab('register')">Create Profile</span>
        </div>

        <!-- System Message / Errors -->
        <div id="sys-message" class="hidden rounded-lg p-3 mb-4 text-sm font-medium text-center"></div>

        <!-- Login Form -->
        <form id="form-login" onsubmit="handleAuth(event, 'login')">
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <input type="email" id="login-email" required class="input-field w-full px-4 py-3 rounded-xl text-slate-800 placeholder-slate-400" placeholder="you@company.com">
            </div>
            <div class="mb-8">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" id="login-password" required class="input-field w-full px-4 py-3 rounded-xl text-slate-800 placeholder-slate-400" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3.5 rounded-xl transition-all shadow-md hover:shadow-lg flex justify-center items-center gap-2">
                Sign In to Chatbot <span class="text-lg">→</span>
            </button>
        </form>

        <!-- Register Form -->
        <form id="form-register" class="hidden-form" onsubmit="handleAuth(event, 'register')">
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Full Name</label>
                <input type="text" id="reg-name" required class="input-field w-full px-4 py-3 rounded-xl text-slate-800 placeholder-slate-400" placeholder="Jane Doe">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <input type="email" id="reg-email" required class="input-field w-full px-4 py-3 rounded-xl text-slate-800 placeholder-slate-400" placeholder="jane@company.com">
            </div>
            <div class="mb-8">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Secure Password</label>
                <input type="password" id="reg-password" required class="input-field w-full px-4 py-3 rounded-xl text-slate-800 placeholder-slate-400" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl transition-all shadow-md hover:shadow-lg flex justify-center items-center gap-2">
                Create User Profile
            </button>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('sys-message').classList.add('hidden');
            
            if(tab === 'login') {
                document.getElementById('form-login').classList.remove('hidden-form');
                document.getElementById('form-register').classList.add('hidden-form');
                document.getElementById('tab-login').classList.add('toggle-active');
                document.getElementById('tab-register').classList.remove('toggle-active');
            } else {
                document.getElementById('form-register').classList.remove('hidden-form');
                document.getElementById('form-login').classList.add('hidden-form');
                document.getElementById('tab-register').classList.add('toggle-active');
                document.getElementById('tab-login').classList.remove('toggle-active');
            }
        }

        function showMessage(msg, isError) {
            const el = document.getElementById('sys-message');
            el.innerHTML = msg;
            el.className = `p-3 mb-4 text-sm font-medium text-center rounded-lg ${isError ? 'bg-red-50 text-red-700' : 'bg-teal-50 text-teal-700'}`;
            el.classList.remove('hidden');
        }

        async function handleAuth(e, type) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Processing...';
            btn.disabled = true;

            const endpoint = type === 'login' ? '/api/login' : '/api/signup';
            
            const payload = {};
            if (type === 'login') {
                payload.email = document.getElementById('login-email').value;
                payload.password = document.getElementById('login-password').value;
            } else {
                payload.name = document.getElementById('reg-name').value;
                payload.email = document.getElementById('reg-email').value;
                payload.password = document.getElementById('reg-password').value;
            }

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (data.error) {
                    showMessage(data.error, true);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                } else {
                    showMessage(data.success || 'Success! Redirecting...', false);
                    setTimeout(() => {
                        // After successful login/registration, route to the chatbot page!
                        window.location.href = '/chat';
                    }, 1000);
                }
            } catch (err) {
                showMessage("Connection error. Ensure backend is running.", true);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
