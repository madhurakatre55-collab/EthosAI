<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthosAI | Fairness Terminal</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Custom Style -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="chat-page">

    <!-- Floating Particles -->
    <div class="chat-particles" id="particles"></div>

    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="logo-area" onclick="window.location.href='/'" style="cursor:pointer">
                <div class="logo-icon-sm">
                    <i class="fa-solid fa-scale-balanced" style="color:white"></i>
                </div>
                <h2>EthosAI Fairness Terminal</h2>
            </div>
            <div class="status-indicator">
                <span class="dot"></span> <span>Online</span>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                <div class="avatar logo-avatar">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="bubble">
                    <p>Welcome to the **EthosAI Fairness Terminal**. I am your automated auditing assistant. Paste your dataset context, external file link, or local path, and I will analyze it for bias through my multi-agent lens.</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input type="file" id="fileInput" style="display:none">
            <button id="attachBtn" class="attach-btn" title="Attach dataset (.csv, .json, .txt)">
                <i class="fa-solid fa-paperclip"></i>
            </button>
            <div class="input-wrapper">
                <div id="fileDisplay"></div>
                <textarea id="userInput" placeholder="Input dataset path, URL, or raw context..." rows="1"></textarea>
            </div>
            <button id="sendBtn" class="send-btn">
                <i class="fa-solid fa-paper-plane" style="font-size: 0.9rem;"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Particle Generation
        const particlesContainer = document.getElementById('particles');
        const particleCount = 15;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'chat-particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.bottom = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particle.style.opacity = Math.random() * 0.4;
            particle.style.width = Math.random() * 5 + 2 + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
